name: Release

# Trigger: push a semver tag, e.g.
#   git tag v1.2.0 && git push origin v1.2.0
#
# What this does:
#   1. Writes the tag's version into project.yml (MARKETING_VERSION) and uses the
#      workflow run number as the build number (CURRENT_PROJECT_VERSION). The app's
#      Settings ▸ About reads these from the bundle at runtime, so it updates itself.
#   2. Builds a Release Claude Stats.app and packages it:
#        • if the Developer ID signing secrets below are configured -> a SIGNED +
#          NOTARIZED + stapled DMG;
#        • otherwise -> an ad-hoc-signed (un-notarized) DMG *and* a .zip. Gatekeeper
#          warns on first launch; users open via right-click ▸ Open.
#   3. Creates a GitHub Release for the tag in the PUBLIC releases repo
#      (1pitaph/claude-stats-releases) with the artifact(s) attached — the source
#      repo is private, but the binaries need to be downloadable by anyone.
#   4. If SPARKLE_PRIVATE_ED_KEY is set, EdDSA-signs the archive and publishes an
#      updated appcast.xml to the gh-pages branch of the public releases repo
#      (served at SUFeedURL by GitHub Pages) so existing installs can auto-update.
#   5. Commits the bumped project.yml back to master.
#
# Optional repository secrets (Settings ▸ Secrets and variables ▸ Actions) — set
# ALL of these to get a notarized DMG; leave them unset for the zip/un-notarized DMG path:
#   BUILD_CERTIFICATE_BASE64  Developer ID Application cert exported as .p12, base64-encoded
#                             (macOS:  base64 -i cert.p12 | pbcopy)
#   P12_PASSWORD              password set when exporting the .p12
#   KEYCHAIN_PASSWORD         any string — password for the throwaway CI keychain
#   APPLE_TEAM_ID             10-character Apple Developer Team ID
#   BUILD_PROVISION_PROFILE_BASE64
#                             Developer ID provisioning profile with the
#                             iCloud/CloudKit capability enabled, base64-encoded
#   NOTARY_APPLE_ID           Apple ID email used for notarization
#   NOTARY_PASSWORD           app-specific password for that Apple ID (appleid.apple.com)
#
# Required secret for publishing to the public releases repo:
#   RELEASES_REPO_TOKEN       fine-grained PAT scoped to 1pitaph/claude-stats-releases
#                             with Contents: Read and write. The built-in
#                             GITHUB_TOKEN can only write to the source repo, so a
#                             cross-repo token is required for the Release upload
#                             and the gh-pages deploy.
#
# Auto-update secret (independent of the signing secrets above):
#   SPARKLE_PRIVATE_ED_KEY    base64 EdDSA private key from Sparkle's
#                             `generate_keys -x <file>`. The matching *public*
#                             key goes in Info.plist as SUPublicEDKey. Without
#                             this secret the appcast step is skipped (releases
#                             still publish, but installed apps won't see them).
#                             Requires GitHub Pages enabled for the gh-pages
#                             branch on the public releases repo.
#
# Git language stats runtime:
#   The workflow builds a relocatable GitTools runtime from pinned Ruby,
#   github-linguist, and scc versions before packaging the app. `release-build.sh`
#   requires LINGUIST_RUNTIME_SOURCE so we never ship a Homebrew-dependent
#   development wrapper.
#
# Note: the final step pushes a commit to `master`. If `master` has branch
# protection that blocks the built-in GITHUB_TOKEN, either relax it for this
# workflow or swap in a PAT with `contents: write`.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    # Needs Xcode 26.4+: earlier 26.x ship an `actool` that crashes on the Icon
    # Composer `AppIcon.icon` bundle ("AssetCatalogAgent closed the connection").
    # The macos-15 runner image only goes up to 26.3; macos-26 is the first image
    # that preinstalls 26.4.1 stable.
    runs-on: macos-26
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          submodules: recursive

      - name: Select Xcode
        # Pinned, NOT `latest-stable`: the macos-26 image also preinstalls 26.5
        # beta, which can be removed or replaced without warning. 26.4.1 is the
        # newest stable Xcode that fixes the Icon Composer actool crash.
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.4.1"

      - name: Resolve version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::tag '$GITHUB_REF_NAME' is not v<MAJOR>.<MINOR>.<PATCH>"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$GITHUB_RUN_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Detect signing secrets
        id: signing
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
        run: |
          if [[ -n "$BUILD_CERTIFICATE_BASE64" && -n "$P12_PASSWORD" && -n "$KEYCHAIN_PASSWORD" \
                && -n "$APPLE_TEAM_ID" && -n "$BUILD_PROVISION_PROFILE_BASE64" \
                && -n "$NOTARY_APPLE_ID" && -n "$NOTARY_PASSWORD" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Signing secrets present — will build a notarized DMG."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Signing secrets absent — will build an un-notarized DMG + zip."
          fi

      - name: Detect Sparkle EdDSA key
        id: sparkle
        env:
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
        run: |
          if [[ -n "$SPARKLE_PRIVATE_ED_KEY" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "SPARKLE_PRIVATE_ED_KEY present — will publish an updated appcast."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SPARKLE_PRIVATE_ED_KEY not set — skipping appcast publish; installed apps won't auto-update to this release."
          fi

      - name: Install build tools
        run: |
          brew install xcodegen zig@0.15 ruby-build go cmake pkg-config icu4c libgit2 openssl@3 readline libyaml gmp
          ZIG_PREFIX="$(brew --prefix zig@0.15)"
          ZIG_CACHE="$RUNNER_TEMP/zig-cache"
          mkdir -p "$ZIG_CACHE"
          echo "ZIG_BIN=$ZIG_PREFIX/bin/zig" >> "$GITHUB_ENV"
          echo "ZIG_GLOBAL_CACHE_DIR=$ZIG_CACHE" >> "$GITHUB_ENV"
          "$ZIG_PREFIX/bin/zig" version
          ZIG_GLOBAL_CACHE_DIR="$ZIG_CACHE" "$ZIG_PREFIX/bin/zig" libc >/dev/null

      - name: Import Developer ID signing certificate
        if: steps.signing.outputs.enabled == 'true'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

          SIGN_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | awk -F'"' '/Developer ID Application/ {print $2; exit}')"
          if [[ -z "$SIGN_IDENTITY" ]]; then
            echo "::error::no 'Developer ID Application' identity found in the imported certificate"
            exit 1
          fi
          echo "SIGN_IDENTITY=$SIGN_IDENTITY" >> "$GITHUB_ENV"
          rm -f "$CERT_PATH"

      - name: Install Developer ID provisioning profile
        if: steps.signing.outputs.enabled == 'true'
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          PROFILE_PATH="$RUNNER_TEMP/cloudkit.provisionprofile"
          PROFILE_PLIST="$RUNNER_TEMP/cloudkit-profile.plist"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_UUID="$(/usr/libexec/PlistBuddy -c 'Print UUID' "$PROFILE_PLIST")"
          PROFILE_NAME="$(/usr/libexec/PlistBuddy -c 'Print Name' "$PROFILE_PLIST")"
          PROFILE_APP_ID="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:com.apple.application-identifier' "$PROFILE_PLIST")"
          /usr/libexec/PlistBuddy -c 'Print :Entitlements:com.apple.developer.icloud-services' "$PROFILE_PLIST" | grep -Eq '(^|[[:space:]])(CloudKit|\*)($|[[:space:]])' || {
            echo "::error::provisioning profile is missing the CloudKit service entitlement"
            exit 1
          }
          /usr/libexec/PlistBuddy -c 'Print :Entitlements:com.apple.developer.icloud-container-identifiers' "$PROFILE_PLIST" | grep -q 'iCloud.com.claudestats.ClaudeStats' || {
            echo "::error::provisioning profile is missing iCloud.com.claudestats.ClaudeStats"
            exit 1
          }
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.provisionprofile"
          echo "PROVISIONING_PROFILE_SPECIFIER=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "Installed provisioning profile: $PROFILE_NAME ($PROFILE_UUID, app id: $PROFILE_APP_ID)"

      - name: Bump version in project.yml
        run: bash scripts/bump-version.sh "${{ steps.version.outputs.version }}" "${{ steps.version.outputs.build }}"

      - name: Build GitTools runtime
        run: |
          bash scripts/build-gittools-runtime.sh "$RUNNER_TEMP/gittools-runtime"
          bash scripts/verify-gittools-runtime.sh "$RUNNER_TEMP/gittools-runtime"

      - name: Build app and package artifacts
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          APP_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
          LINGUIST_RUNTIME_SOURCE: ${{ runner.temp }}/gittools-runtime
        run: |
          # Defensive: actool talks to these XPC agents and they can be left in a
          # bad state after switching Xcode, which crashes asset-catalog compilation.
          sudo killall -9 com.apple.CoreSimulator.CoreSimulatorService 2>/dev/null || true
          bash scripts/release-build.sh "${{ steps.version.outputs.version }}"

      - name: Generate release notes from source commits
        # GitHub's auto-generated notes come from the *target* repo's history,
        # which on `claude-stats-releases` is just the README — useless. Build
        # the notes here from the private source repo's commits between this tag
        # and the previous semver tag (or from the start if this is the first
        # release). `actions/checkout` with fetch-depth: 0 above fetched all tags.
        #
        # We emit two files with the same content in different formats:
        #   • release_notes.md   → body of the GitHub Release page (markdown)
        #   • release_notes.html → embedded in the appcast's <description>
        #     CDATA so Sparkle renders bullets inline instead of loading a URL
        run: |
          set -euo pipefail
          PREV_TAG="$(git tag --sort=-creatordate --list 'v*.*.*' \
                        | grep -vFx "${GITHUB_REF_NAME}" \
                        | head -1 || true)"
          if [[ -n "$PREV_TAG" ]]; then
            RANGE="${PREV_TAG}..${GITHUB_REF_NAME}"
          else
            RANGE="${GITHUB_REF_NAME}"
          fi
          # Capture commit subjects, one per line, no merges
          COMMITS="$(git log --no-merges --pretty=format:'%s' "$RANGE")"

          # Markdown for GitHub Release
          {
            echo "## Changes"
            echo
            if [[ -n "$PREV_TAG" ]]; then
              echo "Since [\`$PREV_TAG\`](https://github.com/1pitaph/claude-stats-releases/releases/tag/$PREV_TAG):"
              echo
            fi
            while IFS= read -r line; do
              [[ -n "$line" ]] && echo "- $line"
            done <<< "$COMMITS"
          } > release_notes.md

          # HTML for Sparkle's update dialog — minimal, escape &<> in subjects
          {
            echo "<ul>"
            while IFS= read -r line; do
              [[ -z "$line" ]] && continue
              escaped="$(printf '%s' "$line" | sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g')"
              printf '<li>%s</li>\n' "$escaped"
            done <<< "$COMMITS"
            echo "</ul>"
          } > release_notes.html

          echo "----- release_notes.md -----"
          cat release_notes.md
          echo "----- release_notes.html -----"
          cat release_notes.html

      - name: Create GitHub Release (in public releases repo)
        uses: softprops/action-gh-release@v2
        with:
          repository: 1pitaph/claude-stats-releases
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          tag_name: ${{ github.ref_name }}
          files: dist/*
          body_path: release_notes.md

      - name: Build Sparkle appcast
        if: steps.sparkle.outputs.enabled == 'true'
        env:
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
        run: bash scripts/publish-appcast.sh "${{ steps.version.outputs.version }}" "${{ steps.version.outputs.build }}" "${{ github.ref_name }}"

      - name: Deploy appcast to GitHub Pages (public releases repo)
        if: steps.sparkle.outputs.enabled == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.RELEASES_REPO_TOKEN }}
          external_repository: 1pitaph/claude-stats-releases
          publish_dir: ./_site
          publish_branch: gh-pages
          keep_files: true

      - name: Commit version bump back to master
        run: |
          if git diff --quiet -- project.yml; then
            echo "project.yml unchanged — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add project.yml
          git commit -m "chore(release): v${{ steps.version.outputs.version }} [skip ci]"
          git push origin HEAD:master

      - name: Clean up keychain
        if: always() && steps.signing.outputs.enabled == 'true'
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
