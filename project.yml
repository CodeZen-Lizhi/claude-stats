name: ClaudeStats
options:
  bundleIdPrefix: com.claudestats
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

configs:
  Debug: debug
  DebugCloudKit: debug
  Release: release
  ReleaseSigned: release

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.1"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_LANGUAGE: en
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "1.4.4"
    CURRENT_PROJECT_VERSION: "36"

targets:
  GhosttyEmbed:
    type: framework
    platform: macOS
    sources:
      - path: GhosttyEmbed
        excludes:
          - Resources
      - path: ThirdParty/ghostty/macos/Sources/Ghostty
        excludes:
          - "**/*_UIKit.swift"
      - path: ThirdParty/ghostty/macos/Sources/Features/Terminal
      - path: ThirdParty/ghostty/macos/Sources/Features/Splits
      - path: ThirdParty/ghostty/macos/Sources/Features/Command Palette
      - path: ThirdParty/ghostty/macos/Sources/Features/ClipboardConfirmation
      - path: ThirdParty/ghostty/macos/Sources/Features/Secure Input
      - path: ThirdParty/ghostty/macos/Sources/Features/QuickTerminal
      - path: ThirdParty/ghostty/macos/Sources/Features/Update
      - path: ThirdParty/ghostty/macos/Sources/Helpers
      - path: ThirdParty/ghostty/macos/Assets.xcassets
      - path: GhosttyEmbed/Resources
        type: folder
        buildPhase: resources
    dependencies:
      - package: Sparkle
      - framework: ThirdParty/ghostty/macos/GhosttyKit.xcframework
      - sdk: Carbon.framework
      - sdk: libc++.tbd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudestats.GhosttyEmbed
        PRODUCT_NAME: GhosttyEmbed
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"
        SWIFT_STRICT_CONCURRENCY: minimal
        SWIFT_OBJC_BRIDGING_HEADER: ThirdParty/ghostty/macos/Sources/App/macOS/ghostty-bridging-header.h
        OTHER_LDFLAGS: "$(inherited) -lstdc++"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
      configs:
        ReleaseSigned:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "$(SIGN_IDENTITY)"
          DEVELOPMENT_TEAM: "$(APPLE_TEAM_ID)"
          ENABLE_HARDENED_RUNTIME: YES
          OTHER_CODE_SIGN_FLAGS: "--timestamp"

  ClaudeStats:
    type: application
    platform: macOS
    sources:
      - path: ClaudeStats
        excludes:
          - Resources/GitTools
      - path: ClaudeStats/Resources/GitTools
        type: folder
        buildPhase: resources
    dependencies:
      - package: Sparkle
      - target: GhosttyEmbed
      - sdk: IOKit.framework
      - sdk: SystemConfiguration.framework
      - sdk: CoreWLAN.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudestats.ClaudeStats
        PRODUCT_NAME: "Claude Stats"
        PRODUCT_MODULE_NAME: ClaudeStats
        INFOPLIST_FILE: ClaudeStats/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        GENERATE_INFOPLIST_FILE: NO
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: ClaudeStats/App/ClaudeStats.entitlements
          ENABLE_HARDENED_RUNTIME: NO
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_STYLE: Automatic
        DebugCloudKit:
          CODE_SIGN_ENTITLEMENTS: ClaudeStats/App/ClaudeStatsCloudKitDebug.entitlements
          ENABLE_HARDENED_RUNTIME: NO
          CODE_SIGN_IDENTITY: Apple Development
          CODE_SIGN_STYLE: Automatic
          DEVELOPMENT_TEAM: 24XGLNT76L
        Release:
          CODE_SIGN_ENTITLEMENTS: ClaudeStats/App/ClaudeStats.entitlements
          ENABLE_HARDENED_RUNTIME: NO
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_STYLE: Automatic
        ReleaseSigned:
          CODE_SIGN_ENTITLEMENTS: ClaudeStats/App/ClaudeStatsCloudKit.entitlements
          ENABLE_HARDENED_RUNTIME: YES
          CODE_SIGN_IDENTITY: "$(SIGN_IDENTITY)"
          CODE_SIGN_STYLE: Manual
          DEVELOPMENT_TEAM: "$(APPLE_TEAM_ID)"
          OTHER_CODE_SIGN_FLAGS: "--timestamp"
          PROVISIONING_PROFILE: "$(CLAUDE_STATS_PROVISIONING_PROFILE)"
          PROVISIONING_PROFILE_SPECIFIER: "$(CLAUDE_STATS_PROVISIONING_PROFILE_SPECIFIER)"
  ClaudeStatsTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ClaudeStatsTests
    dependencies:
      - target: ClaudeStats
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudestats.ClaudeStatsTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Claude Stats.app/Contents/MacOS/Claude Stats"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  ClaudeStats:
    build:
      targets:
        ClaudeStats: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ClaudeStatsTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  ClaudeStats CloudKit:
    build:
      targets:
        ClaudeStats: all
    run:
      config: DebugCloudKit
    test:
      config: Debug
      targets:
        - ClaudeStatsTests
    profile:
      config: DebugCloudKit
    analyze:
      config: DebugCloudKit
    archive:
      config: Release
