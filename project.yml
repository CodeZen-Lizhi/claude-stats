name: ClaudeStats
options:
  bundleIdPrefix: com.claudestats
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

configs:
  Debug: debug
  DebugCloudKit: debug
  Release: release
  ReleaseSigned: release

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.1"
  SwiftNIO:
    url: https://github.com/apple/swift-nio.git
    from: "2.95.0"
  SwiftNIOSSL:
    url: https://github.com/apple/swift-nio-ssl
    from: "2.36.0"
  SwiftCertificates:
    url: https://github.com/apple/swift-certificates.git
    from: "1.18.0"
  SwiftCrypto:
    url: https://github.com/apple/swift-crypto
    from: "4.2.0"
  Defaults:
    url: https://github.com/sindresorhus/Defaults
    from: "9.0.2"
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.2.4"
  SwiftUIIntrospect:
    url: https://github.com/siteline/swiftui-introspect
    from: "1.3.0"
  LottieUI:
    url: https://github.com/jasudev/LottieUI.git
    branch: main
  Lottie:
    url: https://github.com/airbnb/lottie-spm.git
    branch: main
  MacroVisionKit:
    url: https://github.com/TheBoredTeam/MacroVisionKit
    from: "0.1.0"
  SkyLightWindow:
    url: https://github.com/Lakr233/SkyLightWindow
    branch: main
  AtollExtensionKit:
    url: https://github.com/Ebullioscopic/AtollExtensionKit
    branch: main
  SwiftCollections:
    url: https://github.com/apple/swift-collections.git
    from: "1.1.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_LANGUAGE: en
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "1.5.7"
    CURRENT_PROJECT_VERSION: "48"
    ROCKXY_FAMILY_NAMESPACE: com.claudestats.rockxy
    ROCKXY_SHARED_SUPPORT_DIRECTORY_NAME: com.claudestats.rockxy
    ROCKXY_SHARED_CERTIFICATE_LABEL_PREFIX: com.claudestats.rockxy.rootCA
    ROCKXY_SHARED_UTTYPE_PREFIX: com.claudestats.rockxy
    ROCKXY_HELPER_BUNDLE_ID: com.claudestats.rockxy.helper
    ROCKXY_HELPER_MACH_SERVICE_NAME: com.claudestats.rockxy.helper
    ROCKXY_HELPER_PLIST_NAME: com.claudestats.rockxy.helper.plist
    ROCKXY_HELPER_BINARY_NAME: RockxyHelperTool
    ROCKXY_HELPER_BUNDLE_PROGRAM: Contents/Library/HelperTools/RockxyHelperTool
    ROCKXY_HELPER_VERSION: "0.7.1"
    ROCKXY_HELPER_BUILD: "7"
    ROCKXY_HELPER_PROTOCOL_VERSION: "1"
    ROCKXY_ALLOWED_CALLER_IDENTIFIERS: com.claudestats.ClaudeStats
    ROCKXY_DEFAULTS_PREFIX: com.claudestats.rockxy
    ROCKXY_NOTIFICATION_PREFIX: com.claudestats.rockxy
    ROCKXY_LOG_SUBSYSTEM: com.claudestats.ClaudeStats
    ROCKXY_APP_SUPPORT_DIRECTORY_NAME: com.claudestats.rockxy

targets:
  RockxyHelperTool:
    type: tool
    platform: macOS
    sources:
      - path: ThirdParty/Rockxy/Shared
        excludes:
          - RockxyUpdateConfiguration.swift
      - path: ThirdParty/Rockxy/RockxyHelperTool
        excludes:
          - Info.plist
          - com.amunx.rockxy.helper.plist
    dependencies:
      - sdk: Security.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "$(ROCKXY_HELPER_BUNDLE_ID)"
        PRODUCT_NAME: RockxyHelperTool
        MARKETING_VERSION: "1.5.7"
        CURRENT_PROJECT_VERSION: "48"
        INFOPLIST_FILE: ThirdParty/Rockxy/RockxyHelperTool/Info.plist
        CREATE_INFOPLIST_SECTION_IN_BINARY: YES
        GENERATE_INFOPLIST_FILE: NO
        INSTALL_PATH: ""
        SKIP_INSTALL: YES
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_VERSION: "5.0"
        SWIFT_STRICT_CONCURRENCY: minimal
        SWIFT_SUPPRESS_WARNINGS: YES
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_STYLE: Automatic
        DebugCloudKit:
          CODE_SIGN_IDENTITY: Apple Development
          CODE_SIGN_STYLE: Automatic
          DEVELOPMENT_TEAM: 24XGLNT76L
        Release:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_STYLE: Automatic
        ReleaseSigned:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
          CODE_SIGN_IDENTITY: "$(SIGN_IDENTITY)"
          DEVELOPMENT_TEAM: "$(APPLE_TEAM_ID)"
          OTHER_CODE_SIGN_FLAGS: "--timestamp"

  RockxyBackendEmbed:
    type: framework
    platform: macOS
    sources:
      - path: RockxyBackendEmbed
      - path: ThirdParty/Rockxy/Shared/RockxyIdentity.swift
      - path: ThirdParty/Rockxy/Shared/RockxyHelperProtocol.swift
      - path: ThirdParty/Rockxy/Shared/HelperInfo.swift
      - path: ThirdParty/Rockxy/Shared/CallerValidation.swift
      - path: ThirdParty/Rockxy/Shared/ConnectionValidator.swift
      - path: ThirdParty/Rockxy/Rockxy/Core/Services/Infrastructure/AppNotifications.swift
      - path: ThirdParty/Rockxy/Rockxy/Models/Network
      - path: ThirdParty/Rockxy/Rockxy/Models/Log
      - path: ThirdParty/Rockxy/Rockxy/Models/Plugins
      - path: ThirdParty/Rockxy/Rockxy/Models/Rules
      - path: ThirdParty/Rockxy/Rockxy/Models/Settings
      - path: ThirdParty/Rockxy/Rockxy/Core/Detection
      - path: ThirdParty/Rockxy/Rockxy/Core/Storage/AppSettingsStorage.swift
      - path: ThirdParty/Rockxy/Rockxy/Core/Utilities
        excludes:
          - PreviewRenderer.swift
          - RequestCopyFormatter.swift
      - path: ThirdParty/Rockxy/Rockxy/Core/RuleEngine
      - path: ThirdParty/Rockxy/Rockxy/Core/Plugins
      - path: ThirdParty/Rockxy/Rockxy/Core/Certificate
        excludes:
          - CertificateMenuActionRouter.swift
          - RootCADownloadServer.swift
          - RootCADownloadSession.swift
      - path: ThirdParty/Rockxy/Rockxy/Core/ProxyEngine
        excludes:
          - CharlesSSLImporter.swift
          - HTTPToolkitImporter.swift
          - ProxymanSSLImporter.swift
    dependencies:
      - package: SwiftNIO
        product: NIOCore
      - package: SwiftNIO
        product: NIOHTTP1
      - package: SwiftNIO
        product: NIOPosix
      - package: SwiftNIO
        product: NIOWebSocket
      - package: SwiftNIOSSL
        product: NIOSSL
      - package: SwiftCertificates
        product: X509
      - package: SwiftCrypto
        product: Crypto
      - sdk: AppKit.framework
      - sdk: JavaScriptCore.framework
      - sdk: Security.framework
      - sdk: ServiceManagement.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudestats.RockxyBackendEmbed
        PRODUCT_NAME: RockxyBackendEmbed
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"
        SWIFT_STRICT_CONCURRENCY: minimal
        SWIFT_SUPPRESS_WARNINGS: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
      configs:
        ReleaseSigned:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "$(SIGN_IDENTITY)"
          DEVELOPMENT_TEAM: "$(APPLE_TEAM_ID)"
          ENABLE_HARDENED_RUNTIME: YES
          OTHER_CODE_SIGN_FLAGS: "--timestamp"

  GhosttyEmbed:
    type: framework
    platform: macOS
    sources:
      - path: GhosttyEmbed
        excludes:
          - Resources
      - path: ThirdParty/ghostty/macos/Sources/Ghostty
        excludes:
          - "**/*_UIKit.swift"
      - path: ThirdParty/ghostty/macos/Sources/Features/Terminal
      - path: ThirdParty/ghostty/macos/Sources/Features/Splits
      - path: ThirdParty/ghostty/macos/Sources/Features/Command Palette
      - path: ThirdParty/ghostty/macos/Sources/Features/ClipboardConfirmation
      - path: ThirdParty/ghostty/macos/Sources/Features/Secure Input
      - path: ThirdParty/ghostty/macos/Sources/Features/QuickTerminal
      - path: ThirdParty/ghostty/macos/Sources/Features/Update
      - path: ThirdParty/ghostty/macos/Sources/Helpers
      - path: ThirdParty/ghostty/macos/Assets.xcassets
      - path: GhosttyEmbed/Resources
        type: folder
        buildPhase: resources
    dependencies:
      - package: Sparkle
      - framework: ThirdParty/ghostty/macos/GhosttyKit.xcframework
      - sdk: Carbon.framework
      - sdk: libc++.tbd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudestats.GhosttyEmbed
        PRODUCT_NAME: GhosttyEmbed
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"
        SWIFT_STRICT_CONCURRENCY: minimal
        SWIFT_OBJC_BRIDGING_HEADER: ThirdParty/ghostty/macos/Sources/App/macOS/ghostty-bridging-header.h
        OTHER_LDFLAGS: "$(inherited) -lstdc++"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
      configs:
        ReleaseSigned:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "$(SIGN_IDENTITY)"
          DEVELOPMENT_TEAM: "$(APPLE_TEAM_ID)"
          ENABLE_HARDENED_RUNTIME: YES
          OTHER_CODE_SIGN_FLAGS: "--timestamp"

  AtollEmbed:
    type: framework
    platform: macOS
    sources:
      - path: AtollEmbed
      - path: ThirdParty/Atoll/DynamicIsland
        excludes:
          - DynamicIslandApp.swift
          - Info.plist
          - DynamicIsland.entitlements
          - menu
          - "Preview Content"
          - components/Settings
          - components/Onboarding
          - components/TestView.swift
          - components/Notch/NotchTerminalView.swift
          - audio/AudioTap.swift
          - managers/TerminalManager.swift
          - observers/FullscreenMediaDetection.swift
      - path: ThirdParty/Atoll/LottieAnimations
        type: folder
        buildPhase: resources
    dependencies:
      - target: GhosttyEmbed
      - package: Defaults
      - package: KeyboardShortcuts
      - package: SwiftUIIntrospect
      - package: LottieUI
      - package: MacroVisionKit
      - package: SkyLightWindow
      - package: AtollExtensionKit
      - package: SwiftCollections
        product: Collections
      - framework: ThirdParty/Atoll/Frameworks/MediaRemoteAdapter.framework
      - sdk: Accelerate.framework
      - sdk: AppKit.framework
      - sdk: ApplicationServices.framework
      - sdk: AudioToolbox.framework
      - sdk: AVFoundation.framework
      - sdk: Carbon.framework
      - sdk: CoreAudio.framework
      - sdk: CoreBluetooth.framework
      - sdk: CoreImage.framework
      - sdk: CoreLocation.framework
      - sdk: CoreMediaIO.framework
      - sdk: CoreServices.framework
      - sdk: EventKit.framework
      - sdk: IOBluetooth.framework
      - sdk: IOKit.framework
      - sdk: MusicKit.framework
      - sdk: Network.framework
      - sdk: PDFKit.framework
      - sdk: QuickLook.framework
      - sdk: QuickLookThumbnailing.framework
      - sdk: QuickLookUI.framework
      - sdk: QuartzCore.framework
      - sdk: UniformTypeIdentifiers.framework
      - sdk: Vision.framework
      - sdk: WebKit.framework
      - sdk: libc++.tbd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudestats.AtollEmbed
        PRODUCT_NAME: AtollEmbed
        PRODUCT_MODULE_NAME: AtollEmbed
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"
        SWIFT_STRICT_CONCURRENCY: minimal
        SWIFT_SUPPRESS_WARNINGS: YES
        SWIFT_OBJC_BRIDGING_HEADER: ThirdParty/Atoll/DynamicIsland/DynamicIsland-Bridging-Header.h
        HEADER_SEARCH_PATHS: "$(inherited) ThirdParty/Atoll/DynamicIsland"
        CLANG_CXX_LANGUAGE_STANDARD: gnu++20
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @loader_path/Frameworks @loader_path/../Frameworks"
      configs:
        ReleaseSigned:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "$(SIGN_IDENTITY)"
          DEVELOPMENT_TEAM: "$(APPLE_TEAM_ID)"
          ENABLE_HARDENED_RUNTIME: YES
          OTHER_CODE_SIGN_FLAGS: "--timestamp"

  ClaudeStats:
    type: application
    platform: macOS
    sources:
      - path: ClaudeStats
        excludes:
          - Resources/GitTools
      - path: ClaudeStats/Resources/GitTools
        type: folder
        buildPhase: resources
    dependencies:
      - package: Sparkle
      - target: RockxyBackendEmbed
      - target: RockxyHelperTool
        link: false
        codeSign: true
        copy:
          destination: wrapper
          subpath: Contents/Library/HelperTools
      - target: GhosttyEmbed
      - target: AtollEmbed
      - package: Lottie
      - package: SwiftCollections
        product: Collections
      - framework: ThirdParty/Atoll/Frameworks/MediaRemoteAdapter.framework
        embed: true
        codeSign: true
      - sdk: IOKit.framework
      - sdk: SystemConfiguration.framework
      - sdk: CoreWLAN.framework
    postBuildScripts:
      - name: Copy Atoll MediaRemote Runtime Resources
        inputFiles:
          - "$(SRCROOT)/ThirdParty/Atoll/mediaremote-adapter/mediaremote-adapter.pl"
          - "$(SRCROOT)/ThirdParty/Atoll/Contents/Helpers/NowPlayingTestClient"
        outputFiles:
          - "$(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/mediaremote-adapter.pl"
          - "$(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Helpers/NowPlayingTestClient"
        script: |
          set -euo pipefail

          RESOURCES_DIR="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          HELPERS_DIR="${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/Helpers"

          /bin/mkdir -p "$RESOURCES_DIR" "$HELPERS_DIR"
          /usr/bin/install -m 755 \
            "${SRCROOT}/ThirdParty/Atoll/mediaremote-adapter/mediaremote-adapter.pl" \
            "${RESOURCES_DIR}/mediaremote-adapter.pl"
          /usr/bin/install -m 755 \
            "${SRCROOT}/ThirdParty/Atoll/Contents/Helpers/NowPlayingTestClient" \
            "${HELPERS_DIR}/NowPlayingTestClient"

          if [ "${CODE_SIGNING_ALLOWED:-NO}" != "NO" ] \
            && [ -n "${EXPANDED_CODE_SIGN_IDENTITY:-}" ] \
            && [ "${EXPANDED_CODE_SIGN_IDENTITY}" != "-" ]; then
            CODESIGN_OPTIONS=""
            if [ "${ENABLE_HARDENED_RUNTIME:-NO}" = "YES" ]; then
              CODESIGN_OPTIONS="--options runtime"
            fi

            CODESIGN_TIMESTAMP=""
            case " ${OTHER_CODE_SIGN_FLAGS:-} " in
              *" --timestamp "*) CODESIGN_TIMESTAMP="--timestamp" ;;
            esac

            /usr/bin/codesign --force $CODESIGN_OPTIONS $CODESIGN_TIMESTAMP \
              --sign "${EXPANDED_CODE_SIGN_IDENTITY}" \
              "${HELPERS_DIR}/NowPlayingTestClient"
          fi
      - name: Generate Rockxy Helper LaunchDaemon Plist
        outputFiles:
          - "$(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Library/LaunchDaemons/$(ROCKXY_HELPER_PLIST_NAME)"
        script: |
          set -euo pipefail

          for REQUIRED_VAR in ROCKXY_HELPER_PLIST_NAME ROCKXY_HELPER_MACH_SERVICE_NAME ROCKXY_ALLOWED_CALLER_IDENTIFIERS ROCKXY_HELPER_BUNDLE_PROGRAM; do
            eval "VALUE=\${$REQUIRED_VAR}"
            if [ -z "$VALUE" ] || [[ "$VALUE" == *'$('* ]]; then
              echo "error: Missing required build setting $REQUIRED_VAR"
              exit 1
            fi
          done

          PLIST_DIR="${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/Library/LaunchDaemons"
          PLIST="${PLIST_DIR}/${ROCKXY_HELPER_PLIST_NAME}"
          /bin/mkdir -p "$PLIST_DIR"

          ABI_ENTRIES=""
          for BUNDLE_ID in ${ROCKXY_ALLOWED_CALLER_IDENTIFIERS}; do
            ABI_ENTRIES="${ABI_ENTRIES}\t\t<string>${BUNDLE_ID}</string>\n"
          done

          cat > "$PLIST" <<PLISTEOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          	<key>Label</key>
          	<string>${ROCKXY_HELPER_MACH_SERVICE_NAME}</string>
          	<key>BundleProgram</key>
          	<string>${ROCKXY_HELPER_BUNDLE_PROGRAM}</string>
          	<key>MachServices</key>
          	<dict>
          		<key>${ROCKXY_HELPER_MACH_SERVICE_NAME}</key>
          		<true/>
          	</dict>
          	<key>AssociatedBundleIdentifiers</key>
          	<array>
          $(printf "%b" "${ABI_ENTRIES}")	</array>
          </dict>
          </plist>
          PLISTEOF
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudestats.ClaudeStats
        PRODUCT_NAME: "Claude Stats"
        PRODUCT_MODULE_NAME: ClaudeStats
        INFOPLIST_FILE: ClaudeStats/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        GENERATE_INFOPLIST_FILE: NO
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: ClaudeStats/App/ClaudeStats.entitlements
          ENABLE_HARDENED_RUNTIME: NO
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_STYLE: Automatic
        DebugCloudKit:
          CODE_SIGN_ENTITLEMENTS: ClaudeStats/App/ClaudeStatsCloudKitDebug.entitlements
          ENABLE_HARDENED_RUNTIME: NO
          CODE_SIGN_IDENTITY: Apple Development
          CODE_SIGN_STYLE: Automatic
          DEVELOPMENT_TEAM: 24XGLNT76L
        Release:
          CODE_SIGN_ENTITLEMENTS: ClaudeStats/App/ClaudeStats.entitlements
          ENABLE_HARDENED_RUNTIME: NO
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_STYLE: Automatic
        ReleaseSigned:
          CODE_SIGN_ENTITLEMENTS: ClaudeStats/App/ClaudeStatsCloudKit.entitlements
          ENABLE_HARDENED_RUNTIME: YES
          CODE_SIGN_IDENTITY: "$(SIGN_IDENTITY)"
          CODE_SIGN_STYLE: Manual
          DEVELOPMENT_TEAM: "$(APPLE_TEAM_ID)"
          OTHER_CODE_SIGN_FLAGS: "--timestamp"
          PROVISIONING_PROFILE: "$(CLAUDE_STATS_PROVISIONING_PROFILE)"
          PROVISIONING_PROFILE_SPECIFIER: "$(CLAUDE_STATS_PROVISIONING_PROFILE_SPECIFIER)"
  ClaudeStatsTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ClaudeStatsTests
    dependencies:
      - target: ClaudeStats
      - target: RockxyBackendEmbed
      - target: AtollEmbed
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudestats.ClaudeStatsTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Claude Stats.app/Contents/MacOS/Claude Stats"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  ClaudeStats:
    build:
      targets:
        ClaudeStats: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ClaudeStatsTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  ClaudeStats CloudKit:
    build:
      targets:
        ClaudeStats: all
    run:
      config: DebugCloudKit
    test:
      config: Debug
      targets:
        - ClaudeStatsTests
    profile:
      config: DebugCloudKit
    analyze:
      config: DebugCloudKit
    archive:
      config: Release
