name: ClaudeStats
options:
  bundleIdPrefix: com.claudestats
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

configs:
  Debug: debug
  DebugCloudKit: debug
  Release: release

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.1"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_LANGUAGE: en
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "1.3.3"
    CURRENT_PROJECT_VERSION: "16"

targets:
  ClaudeStats:
    type: application
    platform: macOS
    sources:
      - path: ClaudeStats
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudestats.ClaudeStats
        PRODUCT_NAME: "Claude Stats"
        PRODUCT_MODULE_NAME: ClaudeStats
        INFOPLIST_FILE: ClaudeStats/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        GENERATE_INFOPLIST_FILE: NO
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: ClaudeStats/App/ClaudeStats.entitlements
          ENABLE_HARDENED_RUNTIME: NO
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_STYLE: Automatic
        DebugCloudKit:
          CODE_SIGN_ENTITLEMENTS: ClaudeStats/App/ClaudeStatsCloudKitDebug.entitlements
          ENABLE_HARDENED_RUNTIME: NO
          CODE_SIGN_IDENTITY: Apple Development
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_ENTITLEMENTS: ClaudeStats/App/ClaudeStats.entitlements
          ENABLE_HARDENED_RUNTIME: NO
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_STYLE: Automatic
  ClaudeStatsTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ClaudeStatsTests
    dependencies:
      - target: ClaudeStats
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudestats.ClaudeStatsTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Claude Stats.app/Contents/MacOS/Claude Stats"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  ClaudeStats:
    build:
      targets:
        ClaudeStats: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ClaudeStatsTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  ClaudeStats CloudKit:
    build:
      targets:
        ClaudeStats: all
    run:
      config: DebugCloudKit
    test:
      config: Debug
      targets:
        - ClaudeStatsTests
    profile:
      config: DebugCloudKit
    analyze:
      config: DebugCloudKit
    archive:
      config: Release
