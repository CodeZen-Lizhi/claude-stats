name: ClaudeStats
options:
  bundleIdPrefix: com.claudestats
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

configs:
  Debug: debug
  Release: release
  ReleaseSigned: release

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.1"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ARCHS: arm64
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_LANGUAGE: en
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "1.7.8"
    CURRENT_PROJECT_VERSION: "77"
targets:
  ClaudeStats:
    type: application
    platform: macOS
    sources:
      - path: ClaudeStats
        excludes:
          - AppIcon.icon
          - Resources/GitTools
      - path: ClaudeStats/Resources/GitTools
        type: folder
        buildPhase: resources
    dependencies:
      - package: Sparkle
      - sdk: ApplicationServices.framework
      - sdk: Accelerate.framework
      - sdk: ScreenCaptureKit.framework
      - sdk: Vision.framework
      - sdk: IOKit.framework
      - sdk: SystemConfiguration.framework
      - sdk: CoreWLAN.framework
      - sdk: WebKit.framework
      - sdk: libc++.tbd
      - sdk: libsqlite3.tbd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudestats.CodexStatistics
        PRODUCT_NAME: "Codex Statistics"
        PRODUCT_MODULE_NAME: ClaudeStats
        INFOPLIST_FILE: ClaudeStats/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        GENERATE_INFOPLIST_FILE: NO
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        CLANG_CXX_LANGUAGE_STANDARD: gnu++17
        CLANG_CXX_LIBRARY: libc++
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: ClaudeStats/App/ClaudeStats.entitlements
          ENABLE_HARDENED_RUNTIME: NO
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_ENTITLEMENTS: ClaudeStats/App/ClaudeStats.entitlements
          ENABLE_HARDENED_RUNTIME: NO
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_STYLE: Automatic
        ReleaseSigned:
          CODE_SIGN_ENTITLEMENTS: ClaudeStats/App/ClaudeStats.entitlements
          ENABLE_HARDENED_RUNTIME: YES
          CODE_SIGN_IDENTITY: "$(SIGN_IDENTITY)"
          CODE_SIGN_STYLE: Manual
          DEVELOPMENT_TEAM: "$(APPLE_TEAM_ID)"
          OTHER_CODE_SIGN_FLAGS: "--timestamp"
          PROVISIONING_PROFILE: "$(CLAUDE_STATS_PROVISIONING_PROFILE)"
          PROVISIONING_PROFILE_SPECIFIER: "$(CLAUDE_STATS_PROVISIONING_PROFILE_SPECIFIER)"

  ClaudeStatsTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ClaudeStatsTests
    dependencies:
      - target: ClaudeStats
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudestats.CodexStatisticsTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Codex Statistics.app/Contents/MacOS/Codex Statistics"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  ClaudeStats:
    build:
      targets:
        ClaudeStats: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ClaudeStatsTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
